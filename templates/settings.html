{% extends "base.html" %}
{% block page_title %}團隊設定{% endblock %}
{% block content %}
<div class="settings-page">
    <div class="card">
        <div class="card-header">
            <h3><i class="fas fa-sliders"></i> 團隊設定</h3>
        </div>
        <div class="card-body">
            <form id="settingsForm" class="form">
                <div class="form-group">
                    <label>團隊名稱</label>
                    <input type="text" name="team_name" value="{{ team.name }}" class="form-input" disabled>
                    <small class="form-hint">修改名稱需聯繫管理員</small>
                </div>
                <div class="form-group">
                    <label>遊戲名稱</label>
                    <input type="text" name="game_name" value="{{ team.game_name }}" class="form-input" disabled>
                </div>
                <div class="form-group">
                    <label>預設入帳方式</label>
                    <select name="default_income_method" class="form-input">
                        <option value="deduct" {{ 'selected' if team.default_income_method=='deduct' }}>扣薪入帳</option>
                        <option value="no_deduct" {{ 'selected' if team.default_income_method!='deduct' }}>不扣薪入帳</option>
                    </select>
                    <small class="form-hint">
                        <strong>扣薪入帳:</strong> 系統自動從成員錢包扣除<br>
                        <strong>不扣薪入帳:</strong> 會計已預先收帳，系統不扣款
                    </small>
                </div>
                <div class="form-group">
                    <label>顯示設定</label>
                    <div class="form-checkbox">
                        <label>
                            <input type="checkbox" name="show_dkp_ranking" value="1" {{ 'checked' if settings.get('show_dkp_ranking')=='1' }}>
                            儀表板顯示DKP排名
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> 儲存設定
                </button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h3><i class="fas fa-info-circle"></i> 團隊資訊</h3>
        </div>
        <div class="card-body">
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">團隊ID</span>
                    <span class="info-value">#{{ team.id }}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">創建時間</span>
                    <span class="info-value">{{ team.created_at[:19] }}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">狀態</span>
                    <span class="info-value">{{ '啟用中' if team.is_active else '已停用' }}</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('settingsForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = {};
    for (const [key, val] of fd.entries()) {
        data[key] = val;
    }
    await apiCall('/api/team/{{ team.id }}/settings', 'POST', data);
    showToast('設定已儲存');
});
</script>
{% endblock %}
